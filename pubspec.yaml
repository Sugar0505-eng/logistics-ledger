name: logistics_ledger
description: 物流账目管理 App（Android 优先，纯本地）。
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 本地数据库（纯 SQL，无需代码生成）
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # 端上 OCR（柜号识别，离线）
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2

  # CSV 导出与分享
  csv: ^6.0.0
  share_plus: ^9.0.0

  # 日期/数字格式化
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
