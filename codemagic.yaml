workflows:
  android-build:
    name: Android APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: 生成 Android 平台脚手架（不覆盖已有 lib/ 与 pubspec.yaml）
        script: |
          flutter create --platforms=android --project-name logistics_ledger .
      - name: 将 minSdk 提升到 21（ML Kit 要求）
        script: |
          for f in android/app/build.gradle android/app/build.gradle.kts; do
            [ -f "$f" ] && perl -pi -e 's/flutter\.minSdkVersion/21/g' "$f"
          done
      - name: 关闭 R8 代码压缩并为 ML Kit 添加 keep 规则
        script: |
          # 关闭 minify / resource shrink（兼容 Kotlin DSL 与 Groovy）
          for f in android/app/build.gradle.kts android/app/build.gradle; do
            [ -f "$f" ] && perl -pi -e \
              's/isMinifyEnabled = true/isMinifyEnabled = false/g; s/isShrinkResources = true/isShrinkResources = false/g; s/minifyEnabled true/minifyEnabled false/g; s/shrinkResources true/shrinkResources false/g' \
              "$f"
          done
          # 即便仍启用压缩，也忽略未使用的其它语种识别器缺失类
          printf '%s\n' \
            '-dontwarn com.google.mlkit.vision.text.chinese.**' \
            '-dontwarn com.google.mlkit.vision.text.devanagari.**' \
            '-dontwarn com.google.mlkit.vision.text.japanese.**' \
            '-dontwarn com.google.mlkit.vision.text.korean.**' \
            >> android/app/proguard-rules.pro
      - name: 拉取依赖
        script: flutter pub get
      - name: 运行单元测试（失败则中止构建）
        script: flutter test
      - name: 构建 Release APK
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
    # 如需构建完成后邮件收到 apk，取消下面注释并填入你的邮箱：
    # publishing:
    #   email:
    #     recipients:
    #       - enyu734@gmail.com

  ios-build:
    name: iOS（仅编译，不签名）
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: 生成 iOS 平台脚手架（不覆盖已有 lib/ 与 pubspec.yaml）
        script: |
          flutter create --platforms=ios --project-name logistics_ledger .
      - name: 将 iOS 最低版本提升到 15.5（ML Kit 要求）
        script: |
          # Podfile：设定平台版本（兼容已注释/未注释的写法）
          perl -pi -e "s/^#?\s*platform :ios.*/platform :ios, '15.5'/g" ios/Podfile
          # Xcode 工程：提升部署目标
          perl -pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = [\d.]+;/IPHONEOS_DEPLOYMENT_TARGET = 15.5;/g' ios/Runner.xcodeproj/project.pbxproj
      - name: 拉取依赖
        script: flutter pub get
      - name: 运行单元测试
        script: flutter test
      - name: 构建 iOS（不签名）
        script: |
          flutter build ios --release --no-codesign
      - name: 打包未签名产物（仅供验证编译，无法安装到 iPhone）
        script: |
          APP=$(find build/ios/iphoneos -maxdepth 1 -name '*.app' | head -1)
          if [ -n "$APP" ]; then
            mkdir -p build/ios/unsigned/Payload
            cp -r "$APP" build/ios/unsigned/Payload/
            cd build/ios/unsigned && zip -qr app-unsigned.ipa Payload
          fi
    artifacts:
      - build/ios/unsigned/*.ipa
